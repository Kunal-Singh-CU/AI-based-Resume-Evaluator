<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Resume Intelligence</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>🚀 AI Based Resume Evaluator</h1>

    <form id="resumeForm">

        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>

        <select id="role">
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Data Scientist</option>
            <option>AI Engineer</option>
        </select>

        <input type="text" id="skills" placeholder="Skills (e.g. Java, Python, React)">

        <textarea id="projects" placeholder="Projects (Describe briefly)"></textarea>

        <textarea id="experience" placeholder="Work Experience"></textarea>

        <textarea id="education" placeholder="Education"></textarea>

        <button type="submit">Analyze Resume</button>

    </form>

    <div id="results" style="display:none">

        <p id="loading"></p>

        <!-- SCORE -->
        <div class="section">
            <h2>📊 Resume Strength</h2>

            <div class="meter">
                <div id="scoreBar"></div>
            </div>

            <p id="scoreText"></p>
        </div>

        <div class="section">
            <h2>💪 Strengths</h2>
            <ul id="strengths"></ul>
        </div>

        <div class="section">
            <h2>⚠️ Weaknesses</h2>
            <ul id="weaknesses"></ul>
        </div>

        <div class="section">
            <h2>📉 Missing Skills</h2>
            <ul id="missingSkills"></ul>
        </div>

        <div class="section">
            <h2>💡 Suggestions</h2>
            <ul id="suggestions"></ul>
        </div>

        <div class="section">
            <h2>💼 Recommended Jobs</h2>
            <div id="jobs"></div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
